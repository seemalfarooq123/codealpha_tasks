<!DOCTYPE html>
<html>
<head>
    <title>Language Translator</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            width: 500px;
            text-align: center;
            color: white;
            box-shadow: 0px 8px 30px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 100px;
            border-radius: 10px;
            border: none;
            padding: 10px;
            outline: none;
            margin-bottom: 15px;
        }

        select {
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin: 5px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: #00c6ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0072ff;
            transform: scale(1.05);
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: white;
            color: black;
            border-radius: 10px;
        }

        .copy-btn {
            margin-top: 10px;
            background: #28a745;
        }

    </style>

    <script>
        function copyText() {
            let text = document.getElementById("result").innerText;
            navigator.clipboard.writeText(text);
            alert("Copied!");
        }
    </script>

</head>

<body>

<div class="container">

    <h2>🌍 Language Translator</h2>

    <form method="POST">
        <textarea name="text" placeholder="Enter text"></textarea>

        <br>

        <select name="source">
            <option value="auto">Auto Detect</option>
            <option value="en">English</option>
            <option value="ur">Urdu</option>
            <option value="fr">French</option>
        </select>

        <select name="target">
            <option value="en">English</option>
            <option value="ur">Urdu</option>
            <option value="fr">French</option>
        </select>

        <br>

        <button type="submit">Translate</button>
    </form>

   {% if translated_text %}
<div class="result-box">
    <p id="result">{{ translated_text }}</p>

    <audio controls>
        <source src="{{ url_for('static', filename='output.mp3') }}" type="audio/mpeg">
    </audio>

    <br>

    <button class="copy-btn" onclick="copyText()">Copy</button>
</div>
{% endif %}

</div>

</body>
</html>
