<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            width: 500px;
            text-align: center;
            color: white;
            box-shadow: 0px 8px 30px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 80%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: #00c6ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0072ff;
            transform: scale(1.05);
        }

        .chat-box {
            margin-top: 20px;
            background: white;
            color: black;
            padding: 15px;
            border-radius: 10px;
        }

        .user {
            color: #0072ff;
            font-weight: bold;
        }

        .bot {
            color: green;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>💬 AI Chatbot</h2>

    <form method="POST">
        <input type="text" name="message" placeholder="Ask something..." required>
        <br>
        <button type="submit">Send</button>
    </form>

    {% if response %}
    <div class="chat-box">
        <p class="bot">🤖 {{ response }}</p>
    </div>
    {% endif %}

</div>

</body>
</html>
